[package]
name = "yterminal"
version = "0.1.0"
description = "A workspace-first terminal emulator"
authors = ["you"]
edition = "2021"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-os = "2"
tauri-plugin-pty = "0.3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# enumerate installed system fonts natively (the WebViews Tauri uses don't
# expose the Local Font Access API). source-only to keep the build self-contained.
font-kit = "0.14"

[features]
custom-protocol = ["tauri/custom-protocol"]
