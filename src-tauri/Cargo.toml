[package]
name = "yterminal"
version = "0.6.0"
description = "A workspace-first terminal emulator"
authors = ["you"]
edition = "2021"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-os = "2"
tauri-plugin-updater = "2"
tauri-plugin-process = "2"
tauri-plugin-opener = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# pseudo-terminal: spawn the user's shell, stream IO, propagate resize/exit.
# upstream `tauri-plugin-pty` wraps this same crate but hides the real OS pid;
# we depend on portable-pty directly so cwd lookups via /proc and lsof work.
portable-pty = "0.9"
# enumerate installed system fonts natively (the WebViews Tauri uses don't
# expose the Local Font Access API). source-only to keep the build self-contained.
font-kit = "0.14"
# unbounded per-pane scrollback storage backed by a single SQLite file. `bundled`
# includes SQLite C source so we don't depend on a system libsqlite3.
rusqlite = { version = "0.31", features = ["bundled"] }

[features]
custom-protocol = ["tauri/custom-protocol"]
