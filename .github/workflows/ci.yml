name: ci

# Fast checks on every push and PR: type-check + frontend build.
# (The full GUI bundle is only built on tagged releases — see release.yml.)

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build frontend
        run: npm run build

  agent:
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, ubuntu-22.04-arm]
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./agent-cli -> target"

      - name: Build agent CLI
        run: cargo build --manifest-path agent-cli/Cargo.toml --bin yterminal-agent

      - name: Test agent CLI crate
        run: cargo test --manifest-path agent-cli/Cargo.toml
