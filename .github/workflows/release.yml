name: release

# Build native bundles on every pushed v* tag (or manual dispatch) and publish
# them to a single draft GitHub Release. The matrix runs three OS jobs; they
# all upload into the same draft via `releaseId` so a) the assets aren't split
# across multiple drafts (race-on-create that tauri-action has historically
# fallen into) and b) `publish-latest-json` can see all assets in one place.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Single job that owns the draft release. Outputs its id for the matrix to
  # target with `releaseId`, so all platform bundles land in one draft.
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.find_or_create.outputs.id }}
    steps:
      - uses: actions/checkout@v4
      - name: Find existing draft or create one
        id: find_or_create
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          # `gh release view <tag>` works for both draft and published releases
          # whose tag_name matches; it errors with exit 1 if none found.
          if existing=$(gh release view "$TAG" --json id --jq '.id' 2>/dev/null); then
            echo "Found existing release for $TAG: id=$existing"
            echo "id=$existing" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          gh release create "$TAG" \
            --draft \
            --title "yterminal $TAG" \
            --notes "See the assets below to download and install this version of yterminal."
          id=$(gh release view "$TAG" --json id --jq '.id')
          echo "id=$id" >> "$GITHUB_OUTPUT"

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          # Apple Silicon + Intel in one universal bundle
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Verify signing key is configured
        shell: bash
        env:
          KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "$KEY" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY secret is not set. Generate a key with 'npx @tauri-apps/cli signer generate' and add it as a repo secret. See docs/superpowers/specs/2026-06-29-auto-update-design.md."
            exit 1
          fi

      - name: Build and upload bundle assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # Upload into the shared draft created above. Without releaseId the
          # action would otherwise race on draft creation and we'd end up with
          # one draft per matrix runner.
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}

      # tauri-action has historically skipped uploading the `.sig` companions
      # for some bundle targets (notably universal-apple-darwin). Sweep the
      # bundle output and upload every `.sig` explicitly so the updater
      # manifest always has a signature to embed.
      - name: Upload signature files
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          count=0
          while IFS= read -r -d '' sig; do
            echo "Uploading $sig"
            gh release upload "$TAG" "$sig" --clobber
            count=$((count + 1))
          done < <(find src-tauri/target -type f -name "*.sig" -print0)
          if [ "$count" -eq 0 ]; then
            echo "::error::No .sig files found under src-tauri/target — bundle did not sign artifacts"
            exit 1
          fi

  publish-latest-json:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: node scripts/generate-latest-json.mjs
      - name: Upload latest.json to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: gh release upload "$TAG" latest.json --clobber
