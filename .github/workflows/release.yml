name: release

# Build native bundles on every pushed v* tag (or manual dispatch) and publish
# them to a single draft GitHub Release.
#
# Why we don't use tauri-apps/tauri-action: in matrix mode each runner races
# on draft creation (so we get one draft per OS, with split assets), and the
# action's universal-apple-darwin path silently skips uploading .sig
# companions. We instead create the draft once up front, then run `tauri
# build` directly on each runner and sweep the bundle output ourselves —
# every artifact, signature included, goes into the same draft.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Single job that owns the draft release. find-or-create makes it idempotent
  # for workflow_dispatch re-runs on the same tag. The matrix jobs upload
  # straight into this draft via `gh release upload` — no `releaseId` plumbing
  # needed.
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Find existing draft or create one
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$TAG" --json id --jq '.id' >/dev/null 2>&1; then
            echo "Found existing release for $TAG"
            exit 0
          fi
          gh release create "$TAG" \
            --draft \
            --title "yterminal $TAG" \
            --notes "See the assets below to download and install this version of yterminal."

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          # Apple Silicon + Intel in one universal bundle
          - platform: macos-latest
            os: macos
            args: "--target universal-apple-darwin"
          - platform: ubuntu-22.04
            os: linux
            args: ""
          - platform: ubuntu-22.04-arm
            os: linux
            args: ""
          - platform: windows-latest
            os: windows
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.os == 'macos' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Verify signing key is configured
        shell: bash
        env:
          KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "$KEY" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY secret is not set. Generate a key with 'npx @tauri-apps/cli signer generate' and add it as a repo secret. See docs/superpowers/specs/2026-06-29-auto-update-design.md."
            exit 1
          fi

      # Tauri builds the GUI as a universal binary, but with multiple Cargo
      # binaries it expects helper executables to already exist in the
      # universal target directory when assembling the .app bundle.
      - name: Build universal agent helper (macOS only)
        if: matrix.os == 'macos'
        shell: bash
        run: |
          set -euo pipefail
          cargo build \
            --manifest-path src-tauri/Cargo.toml \
            --release \
            --bin yterminal-agent \
            --target aarch64-apple-darwin
          cargo build \
            --manifest-path src-tauri/Cargo.toml \
            --release \
            --bin yterminal-agent \
            --target x86_64-apple-darwin
          mkdir -p src-tauri/target/universal-apple-darwin/release
          lipo -create \
            src-tauri/target/aarch64-apple-darwin/release/yterminal-agent \
            src-tauri/target/x86_64-apple-darwin/release/yterminal-agent \
            -output src-tauri/target/universal-apple-darwin/release/yterminal-agent
          lipo -info src-tauri/target/universal-apple-darwin/release/yterminal-agent

      - name: Build tauri bundle
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        # `npm run tauri:build -- ${args}` forwards the extra flag(s) to
        # `tauri build`. We call the CLI directly (rather than going through
        # tauri-apps/tauri-action) so the bundle output stays on disk and we
        # can upload every artifact ourselves — tauri-action's universal-darwin
        # path drops the .sig from its upload list, which makes the updater
        # manifest impossible to assemble downstream.
        run: npm run tauri:build -- ${{ matrix.args }}

      - name: Sign the .deb for in-app updates (Linux only)
        if: matrix.os == 'linux'
        shell: bash
        # tauri build only signs the *updater* artifact formats (AppImage on
        # Linux), so the .deb has no .sig. Our in-app deb updater downloads the
        # .deb and installs it as root via pkexec, so it MUST verify a minisign
        # signature first — we sign the .deb here with the same key, producing
        # <name>.deb.sig that generate-latest-json.mjs folds into latest.json.
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          deb="$(find src-tauri/target -type f -name '*.deb' -print -quit)"
          if [ -z "$deb" ]; then
            echo "::error::No .deb found to sign"
            exit 1
          fi
          echo "Signing $deb"
          npx @tauri-apps/cli signer sign "$deb"
          test -f "$deb.sig" || { echo "::error::signer produced no $deb.sig"; exit 1; }

      - name: Upload bundle artifacts to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          count=0
          sig_count=0
          while IFS= read -r -d '' file; do
            echo "Uploading $file"
            gh release upload "$TAG" "$file" --clobber
            count=$((count + 1))
            case "$file" in *.sig) sig_count=$((sig_count + 1));; esac
          done < <(find src-tauri/target -type f \( \
            -name "*.dmg" -o \
            -name "*.app.tar.gz" -o \
            -name "*.app.tar.gz.sig" -o \
            -name "*.msi" -o \
            -name "*.msi.sig" -o \
            -name "*-setup.exe" -o \
            -name "*-setup.exe.sig" -o \
            -name "*.AppImage" -o \
            -name "*.AppImage.sig" -o \
            -name "*.deb" -o \
            -name "*.deb.sig" -o \
            -name "*.rpm" \
            \) -print0)
          echo "Uploaded $count artifacts ($sig_count .sig files)"
          if [ "$count" -eq 0 ]; then
            echo "::error::No bundle artifacts found under src-tauri/target"
            exit 1
          fi
          if [ "$sig_count" -eq 0 ]; then
            echo "::error::Bundle produced no .sig files — signing must be misconfigured"
            exit 1
          fi


  publish-latest-json:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: node scripts/generate-latest-json.mjs
      - name: Upload latest.json to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: gh release upload "$TAG" latest.json --clobber
